<header class="fixed inset-x-0 top-0 z-50 border-b border-white/10 bg-slate-950/85 backdrop-blur-md">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-10">
    <a href="#about" class="text-lg font-semibold tracking-wide text-white">{{ 'hero.name' | translate }}</a>

    <nav class="flex flex-wrap items-center gap-2 text-sm">
      @for (link of links; track link.id) {
        <a
          [href]="'#' + link.id"
          class="rounded-full px-3 py-1.5 text-slate-300 transition hover:bg-white/10 hover:text-white"
        >
          {{ link.labelKey | translate }}
        </a>
      }
    </nav>

    <div class="flex items-center gap-3">
      <button
        type="button"
        (click)="settings.toggleLanguage()"
        class="inline-flex items-center gap-2 rounded-2xl border border-slate-700/80 bg-slate-950/90 px-4 py-2 text-xs font-semibold text-slate-100 shadow-[0_10px_25px_-15px_rgba(15,23,42,0.8)] transition duration-200 hover:-translate-y-0.5 hover:border-slate-500/70 hover:bg-slate-900/95 hover:shadow-[0_18px_35px_-18px_rgba(15,23,42,0.95)]"
      >
        <i class="fa-solid fa-globe"></i>
        <span>{{ settings.lang() === 'ar' ? 'EN' : 'AR' }}</span>
      </button>
      <button
        type="button"
        (click)="settings.toggleTheme()"
        class="inline-flex items-center justify-center rounded-2xl border border-slate-700/80 bg-slate-950/90 px-4 py-2 text-xs font-semibold text-slate-100 shadow-[0_10px_25px_-15px_rgba(15,23,42,0.8)] transition duration-200 hover:-translate-y-0.5 hover:border-slate-500/70 hover:bg-slate-900/95 hover:shadow-[0_18px_35px_-18px_rgba(15,23,42,0.95)]"
      >
        <i class="fa-solid" [class.fa-moon]="settings.theme() === 'dark'" [class.fa-sun]="settings.theme() !== 'dark'"></i>
      </button>
    </div>
  </div>
</header>
