<header class="fixed inset-x-0 top-0 z-50 border-b border-white/10 bg-slate-950/85 backdrop-blur-md">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-10">

    <!-- Logo -->
    <a href="#about" class="text-lg font-semibold tracking-wide text-white">
      {{ 'hero.name' | translate }}
    </a>

    <!-- Desktop Nav -->
    <nav class="hidden md:flex flex-wrap items-center gap-2 text-sm">
      @for (link of links; track link.id) {
        <a
          [href]="'#' + link.id"
          class="rounded-full px-3 py-1.5 text-slate-300 transition hover:bg-white/10 hover:text-white"
        >
          {{ link.labelKey | translate }}
        </a>
      }
    </nav>

    <!-- Right Side -->
    <div class="flex items-center gap-2">

      <!-- Language -->
      <button
        type="button"
        (click)="settings.toggleLanguage()"
        class="inline-flex items-center gap-2 rounded-2xl border border-slate-700/80 bg-slate-950/90 px-4 py-2 text-xs font-semibold text-slate-100 transition hover:bg-slate-900"
      >
        <i class="fa-solid fa-globe"></i>
        <span>{{ settings.lang() === 'ar' ? 'EN' : 'AR' }}</span>
      </button>

      <!-- Theme -->
      <button
        type="button"
        (click)="settings.toggleTheme()"
        class="inline-flex items-center justify-center rounded-2xl border border-slate-700/80 bg-slate-950/90 px-4 py-2 text-xs font-semibold text-slate-100 transition hover:bg-slate-900"
      >
        <i
          class="fa-solid"
          [class.fa-moon]="settings.theme() === 'dark'"
          [class.fa-sun]="settings.theme() !== 'dark'"
        ></i>
      </button>

      <!-- Hamburger -->
      <button
        type="button"
        class="md:hidden text-white text-xl"
        (click)="toggleMenu()"
      >
        <i
          class="fa-solid"
          [class.fa-bars]="!isMenuOpen"
          [class.fa-xmark]="isMenuOpen"
        ></i>
      </button>

    </div>
  </div>

  <!-- Mobile Menu -->
  @if (isMenuOpen) {
    <div class="md:hidden border-t border-white/10 px-4 pb-4 pt-3">
      <nav class="flex flex-col gap-2 text-sm">
        @for (link of links; track link.id) {
          <a
            (click)="closeMenu()"
            [href]="'#' + link.id"
            class="rounded-lg px-3 py-2 text-slate-300 transition hover:bg-white/10 hover:text-white"
          >
            {{ link.labelKey | translate }}
          </a>
        }
      </nav>
    </div>
  }
</header>
