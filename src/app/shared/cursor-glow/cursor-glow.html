<div class="pointer-events-none fixed inset-0 z-40 hidden md:block">
  <div
    class="absolute h-48 w-48 rounded-full bg-cyan-400/20 blur-3xl transition-transform duration-300"
    [style.transform]="'translate(' + (x - 96) + 'px,' + (y - 96) + 'px)'"
  ></div>
  <div
    class="absolute h-3 w-3 rounded-full bg-cyan-300 transition-transform duration-75"
    [style.transform]="'translate(' + (x - 6) + 'px,' + (y - 6) + 'px)'"
  ></div>
</div>
