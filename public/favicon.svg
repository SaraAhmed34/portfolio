<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Background -->
  <rect width="180" height="180" fill="#0f172a" rx="40"/>
  
  <!-- Gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle border -->
  <circle cx="90" cy="90" r="75" fill="none" stroke="url(#grad1)" stroke-width="3"/>
  
  <!-- Letter S -->
  <text x="90" y="115" font-family="Cairo, serif" font-size="80" font-weight="bold" fill="url(#grad1)" text-anchor="middle" dominant-baseline="middle">S</text>
</svg>